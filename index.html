:root{color-scheme:light}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#f5f0e8;min-height:100vh}
body{font-family:'Rotev',sans-serif;direction:rtl;background:#f5f0e8;min-height:100vh;padding-bottom:2rem}
.header{background:#fdfaf5;border-bottom:2px solid #3a5a8a;padding:1rem 1.2rem 0;text-align:center;position:sticky;top:0;z-index:9999;isolation:isolate}
.site-title{font-family:'Rotev',sans-serif;font-size:1.8rem;color:#2a4a78;letter-spacing:3px;padding-bottom:0.7rem;line-height:1.2}
.tabs{display:flex;border-top:1px solid #d8d0c0}
.tab{flex:1;text-align:center;padding:20px 6px 18px;font-size:21px;font-family:'Rotev',sans-serif;color:#aaa;border-bottom:4px solid transparent;cursor:pointer;transition:color 0.2s,border-color 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;user-select:none;min-height:64px}
.tab.active{color:#2a4a78;border-bottom-color:#2a4a78}
.tab .tab-icon{opacity:0.35;transition:opacity 0.2s}
.tab.active .tab-icon{opacity:1}
.tab:hover:not(.active) .tab-icon{opacity:0.6}
.tab:hover:not(.active){color:#666}
.page-content{max-width:520px;margin:0 auto;padding:1.2rem 1rem}
.panel{display:none}
.panel.panel.active{display:block}
.invite-img{width:100%;border-radius:12px;overflow:hidden;margin-bottom:1rem;box-shadow:0 3px 16px rgba(58,90,138,0.12);border:2px solid #3a5a8a}
.invite-img img{width:100%;display:block}
.invite-placeholder{background:#fdfaf5;padding:3rem 1rem;text-align:center;font-family:'Rotev',sans-serif;color:#aaa;font-size:15px}
.cal-options-row{display:flex;gap:8px;margin-bottom:0.8rem}
.cal-opt-btn{flex:1;padding:13px 8px;background:#2a4a78;color:#fff;border:none;border-radius:10px;font-size:16px;font-family:'Rotev',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;transition:background 0.2s}
.cal-opt-btn:hover{background:#1d3560}
.cal-btn{width:100%;padding:14px;background:#2a4a78;color:#fff;border:none;border-radius:10px;font-size:16px;font-family:'Rotev',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background 0.2s;margin-bottom:0.8rem;letter-spacing:0.5px}
.cal-btn:hover{background:#1d3560}
.cal-icon{width:22px;height:22px;background:#fff;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cal-options{display:none;background:#fdfaf5;border:1px solid #d0c4a8;border-radius:10px;overflow:hidden;margin-top:0}
.cal-opt{display:block;padding:13px 16px;font-size:15px;color:#333;font-family:'Rotev',sans-serif;cursor:pointer;border-bottom:1px solid #e8e0d0}
.cal-opt:last-child{border-bottom:none}
.cal-opt:hover{background:#f5f0e8}
.invite-card{background:#fdfaf5;border:2px solid #3a5a8a;border-radius:12px;padding:1.8rem 1.5rem 1.5rem;position:relative}
.corner-border{position:absolute;width:30px;height:30px;border-color:#3a5a8a;border-style:solid}
.tl{top:7px;left:7px;border-width:2px 0 0 2px}
.tr{top:7px;right:7px;border-width:2px 2px 0 0}
.bl{bottom:7px;left:7px;border-width:0 0 2px 2px}
.br{bottom:7px;right:7px;border-width:0 2px 2px 0}
.fruit-center{text-align:center;margin:0 0 0.7rem}
.fruit-center img{width:110px;height:auto;display:inline-block}
.card-tagline{font-size:13px;color:#777;text-align:center;margin-bottom:0.3rem;font-family:'Rotev',sans-serif;line-height:1.6}
.card-names{font-family:'Rotev',sans-serif;font-size:2.2rem;color:#3d6b2f;text-align:center;margin-bottom:0.6rem;letter-spacing:3px}
.card-date{text-align:center;font-size:14px;color:#2a4a78;margin-bottom:0.8rem;font-family:'Rotev',sans-serif;letter-spacing:1px}
hr.div{border:none;border-top:1px solid #d0c4a8;margin:0.7rem 0}
.timeline-row{display:flex;justify-content:space-between;text-align:center;margin-bottom:1rem;position:relative}
.timeline-row::before{content:'';position:absolute;top:18px;right:8%;left:8%;height:1px;background:#d0c4a8}
.tl-item{flex:1;position:relative;z-index:1}
.tl-time{font-size:1rem;font-family:'Rotev',sans-serif;color:#e07820;display:block;direction:ltr}
.tl-dot{width:9px;height:9px;background:#e07820;border-radius:50%;margin:4px auto;position:relative;z-index:2}
.tl-lbl{font-size:12px;color:#3a5a8a;line-height:1.5;font-family:'Rotev',sans-serif}
.section-lbl{font-size:22px;color:#2a4a78;text-align:center;margin:0.9rem 0 0.8rem;font-family:'Rotev',sans-serif;font-weight:bold}
.form-lbl{font-size:18px;color:#555;display:block;margin-bottom:5px;font-family:'Rotev',sans-serif}
.form-inp{width:100%;padding:12px 13px;font-size:17px;font-family:'Rotev',sans-serif;border:1px solid #c0b090;border-radius:8px;background:#fff;color:#333;direction:rtl;outline:none;margin-bottom:0.9rem;transition:border-color 0.2s,box-shadow 0.2s}
.form-inp:focus{border-color:#3a5a8a;box-shadow:0 0 0 2px rgba(58,90,138,0.1)}
.rsvp-row{display:flex;gap:8px;margin-bottom:0.9rem}
.rsvp-b{flex:1;padding:13px 6px;border:1.5px solid #c8b890;border-radius:9px;background:#fff;cursor:pointer;font-family:'Rotev',sans-serif;font-size:16px;color:#666;text-align:center;transition:all 0.15s}
.rsvp-b:hover{border-color:#3a5a8a;color:#3a5a8a}
.rsvp-b.yes{border-color:#3d6b2f;background:#eaf3de;color:#3d6b2f}
.rsvp-b.no{border-color:#a32d2d;background:#fcebeb;color:#a32d2d}
.count-row{display:flex;align-items:center;gap:10px;margin-bottom:0.9rem}
.cnt-btn{width:36px;height:36px;border:1px solid #c0b090;border-radius:50%;background:#fff;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#3a5a8a;transition:background 0.15s;font-family:sans-serif}
.cnt-btn:hover{background:#e0eaf8}
.cnt-num{width:60px;text-align:center;font-size:20px;font-family:'Rotev',sans-serif;color:#333;border:1px solid #c0b090;border-radius:8px;background:#fff;padding:8px 0}
.cnt-lbl{font-size:20px;color:#888;font-family:'Rotev',sans-serif}
.sub-btn{width:100%;padding:15px;background:#9ab0cb;color:#fff;border:none;border-radius:10px;font-size:18px;font-family:'Rotev',sans-serif;cursor:not-allowed;transition:background 0.2s,transform 0.1s;letter-spacing:0.5px}
.sub-btn.ready{background:#2a4a78;cursor:pointer}
.sub-btn.ready:hover{background:#1d3560;transform:translateY(-1px)}
.sub-btn.done{background:#3d6b2f;cursor:default}
.success-msg{text-align:center;padding:1.2rem;border-radius:10px;margin-top:1rem;font-size:15px;line-height:1.7;font-family:'Rotev',sans-serif;animation:fadeIn 0.4s ease}
.success-yes{background:#eaf3de;color:#3d6b2f}
.success-no{background:#fdf0f0;color:#a32d2d}
.error-msg{background:#fcebeb;color:#a32d2d;border-radius:8px;padding:10px 13px;font-size:13px;margin-top:8px;text-align:center;font-family:'Rotev',sans-serif}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.families{text-align:center;color:#9a8a6a;font-size:17px;margin-top:1.1rem;font-family:'Rotev',sans-serif;letter-spacing:1px}
.nav-title{font-size:22px;color:#2a4a78;margin-bottom:0.8rem;font-family:'Rotev',sans-serif;font-weight:bold;text-align:center}
.map-box{width:100%;border-radius:10px;margin-bottom:1rem;padding:0;text-align:center}
.map-note{font-size:19px;color:#444;margin-top:0.8rem;font-family:'Rotev',sans-serif}
.waze-btn{width:100%;padding:15px;background:#33ccff;color:#1a1a1a;border:none;border-radius:10px;font-size:19px;font-family:'Rotev',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:0.7rem;transition:background 0.2s}
.waze-btn:hover{background:#00b8e6}
.waze-btn svg{width:28px;height:28px;flex-shrink:0}
.nav-address{font-size:20px;color:#444;text-align:center;font-family:'Rotev',sans-serif}
</style>
